services:
  # ---------- Warehouse: Postgres con los datos (bronze/silver/gold) ----------
  warehouse:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${WAREHOUSE_DB}
      POSTGRES_USER: ${WAREHOUSE_USER}
      POSTGRES_PASSWORD: ${WAREHOUSE_PASSWORD}
    volumes:
      - warehouse_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5433:5432"            # 5433 en el host para no chocar con el stack del curso
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${WAREHOUSE_USER} -d ${WAREHOUSE_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------- Metadata DB de Airflow (separada del warehouse) ----------
  airflow_db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: airflow
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
    volumes:
      - airflow_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow -d airflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------- Airflow (standalone: api-server + scheduler + dag-processor) ----------
  airflow:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      warehouse:
        condition: service_healthy
      airflow_db:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow_db:5432/airflow
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      # credenciales del warehouse que leen los DAGs (citybikes_common.py)
      WAREHOUSE_DB: ${WAREHOUSE_DB}
      WAREHOUSE_USER: ${WAREHOUSE_USER}
      WAREHOUSE_PASSWORD: ${WAREHOUSE_PASSWORD}
      WAREHOUSE_HOST: warehouse
      WAREHOUSE_PORT: 5432
      CITYBIKES_NETWORKS: ${CITYBIKES_NETWORKS}
    volumes:
      - ./dags:/opt/airflow/dags
    ports:
      - "8080:8080"
    command: standalone

  # ---------- Dashboard Streamlit (consume SOLO Gold) ----------
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    depends_on:
      warehouse:
        condition: service_healthy
    environment:
      WAREHOUSE_DB: ${WAREHOUSE_DB}
      WAREHOUSE_USER: ${WAREHOUSE_USER}
      WAREHOUSE_PASSWORD: ${WAREHOUSE_PASSWORD}
      WAREHOUSE_HOST: warehouse
      WAREHOUSE_PORT: 5432
    ports:
      - "8501:8501"

volumes:
  warehouse_data:
  airflow_db_data:
